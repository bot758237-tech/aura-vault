<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA VAULT</title>
    <!-- นำเข้าไลบรารีสากลเพื่อเชื่อมต่อบล็อกเชนแบบปลอดภัย -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            background-color: #0f051d;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: linear-gradient(145deg, #1e0b36, #0f051d);
            border-radius: 20px;
            padding: 30px;
            margin: 50px auto;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #331466;
        }
        .btn-connect {
            background: linear-gradient(90deg, #7928ca, #ff0080);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            margin-bottom: 25px;
        }
        .balance-box {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #00df89;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-action {
            background-color: #2d1254;
            color: white;
            border: 1px solid #441a7d;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>AURA VAULT</h2>
        <div style="color: #a0aec0; font-size: 14px; margin-bottom: 25px;" id="walletAddress">สถานะ: ยังไม่ได้เชื่อมต่อ</div>
        
        <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

        <div class="balance-box">
            <div style="color: #a0aec0; font-size: 12px;">ยอดสมดุลบนบล็อกเชน</div>
            <div class="balance-amount" id="balanceDisplay">0.00 BNB</div>
        </div>

        <div class="btn-group">
            <button class="btn-action" onclick="actionRoute('Receive')">Receive</button>
            <button class="btn-action" onclick="actionRoute('Transfer')">Transfer</button>
            <button class="btn-action" onclick="actionRoute('Cross-Swap')">Cross-Swap</button>
        </div>
    </div>

    <script>
        let provider, signer;

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    
                    const address = accounts[0];
                    document.getElementById("walletAddress").innerText = `กระเป๋า: ${address.substring(0,6)}...${address.substring(address.length-4)}`;
                    document.getElementById("connectBtn").innerText = "Connected";

                    const balance = await provider.getBalance(address);
                    document.getElementById("balanceDisplay").innerText = `${parseFloat(ethers.formatEther(balance)).toFixed(4)} BNB`;
                } catch (error) {
                    alert("การเชื่อมต่อถูกปฏิเสธ");
                }
            } else {
                alert("กรุณาเปิดลิงก์นี้ในเบราว์เซอร์ของแอป MetaMask หรือ Trust Wallet ครับ");
            }
        }

        function actionRoute(type) {
            if (!signer) {
                alert("กรุณากดปุ่ม Connect Wallet ก่อนครับ");
                return;
            }
            alert(`ระบบรับทราบฟังก์ชัน ${type} แล้ว (กำลังพัฒนาต่อร่วมกับโรงงานสร้างเหรียญ)`);
        }
    </script>
</body>
</html>
